services:
  backend:
    build:
      context: ./backend
    container_name: gym-prime-backend
    environment:
      DATABASE_URL: postgresql+psycopg://gym_prime:gym_prime@postgres:5432/gym_prime
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: gym_prime
      MINIO_SECRET_KEY: gym_prime_secret
      MINIO_BUCKET: gym-prime
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio

  frontend:
    build:
      context: ./frontend
    container_name: gym-prime-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine
    container_name: gym-prime-postgres
    environment:
      POSTGRES_DB: gym_prime
      POSTGRES_USER: gym_prime
      POSTGRES_PASSWORD: gym_prime
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: gym-prime-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gym_prime
      MINIO_ROOT_PASSWORD: gym_prime_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./bucket/files:/data
